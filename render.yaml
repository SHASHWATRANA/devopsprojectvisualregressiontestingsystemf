# ──────────────────────────────────────────────────────────────
#  Render Blueprint — Visual Regression Testing System
#  Deploy directly from GitHub with Docker
# ──────────────────────────────────────────────────────────────

services:
  - type: web
    name: vrts-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FLASK_ENV
        value: "production"
