# ──────────────────────────────────────────────────────────────
#  GitHub Actions -- CI Pipeline
#  Visual Regression Testing System
#
#  Triggers on push / PR to main / master.
#  Steps:
#    1. Checkout code
#    2. Set up Python 3.12
#    3. Verify Chrome (pre-installed on ubuntu-latest)
#    4. Install Python dependencies
#    5. Run a CLI smoke test against https://example.com
# ──────────────────────────────────────────────────────────────

name: CI -- Visual Regression Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Runs automatically at 00:00 UTC every day
    - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ─────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Chrome ─────────────────────────────────────────────
      # ubuntu-latest runners already ship with Google Chrome;
      # no manual installation required.
      - name: Verify Google Chrome installation
        run: google-chrome --version

      # ── Dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r src/main/config/requirements.txt

      # ── CLI Smoke Test ─────────────────────────────────────
      - name: Run CLI visual regression test
        working-directory: src/main
        run: python cli.py --url https://example.com

      # ── Upload Screenshots (optional artifact) ─────────────
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 7
